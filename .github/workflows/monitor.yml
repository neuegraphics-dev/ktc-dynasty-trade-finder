name: KTC Dynasty Monitor
on:
  schedule:
    - cron: '0 13 * * 5'  # Runs every Friday at 8:00 AM EST (1:00 PM UTC)
  workflow_dispatch:

concurrency:
  group: ktc-dynasty-monitor
  cancel-in-progress: false
  
jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - run: npm install
      
      - run: npm run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_TO_EMAIL: ${{ secrets.GMAIL_TO_EMAIL }}
      - name: Commit playerValues updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/playerValues.json
          git commit -m "Update playerValues.json" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${GITHUB_REF#refs/heads/}
